version: '3.9'

# ═══════════════════════════════════════════════════════════
#  DaveAI.tech — Modular Docker Compose
#  Each service is isolated, independently restartable
# ═══════════════════════════════════════════════════════════

networks:
  daveai-net:
    driver: bridge

volumes:
  brain-data:
    driver: local
  backup-data:
    driver: local
  pixelpaw-builds:
    driver: local

services:

  # ── 1. NGINX GATEWAY ──────────────────────────────────
  nginx:
    build: ./containers/nginx
    container_name: daveai-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_healthy
      agent-brain:
        condition: service_healthy
      edge-tts:
        condition: service_healthy
    networks: [daveai-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 2. FRONTEND (static HTML/CSS/JS) ──────────────────
  frontend:
    build: ./containers/frontend
    container_name: daveai-frontend
    networks: [daveai-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── 3. AGENT-BRAIN API ────────────────────────────────
  agent-brain:
    build: ./containers/agent-brain
    container_name: daveai-brain
    env_file: ./shared/secrets/.env.brain
    networks: [daveai-net]
    volumes:
      - brain-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8888/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── 4. EDGE-TTS ───────────────────────────────────────
  edge-tts:
    build: ./containers/edge-tts
    container_name: daveai-tts
    networks: [daveai-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5050/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 5. LITELLM ROUTER ─────────────────────────────────
  litellm:
    build: ./containers/litellm
    container_name: daveai-litellm
    env_file: ./shared/secrets/.env.litellm
    networks: [daveai-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── 6. SERVE-API (games/static) ───────────────────────
  serve-api:
    build: ./containers/serve-api
    container_name: daveai-serve
    networks: [daveai-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/api/games"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── 7. AGENTIC-UI (Next.js alternate) ─────────────────
  agentic-ui:
    build: ./containers/agentic-ui
    container_name: daveai-ui
    networks: [daveai-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── 8. BACKUP AGENT ───────────────────────────────────
  backup-agent:
    build: ./containers/backup-agent
    container_name: daveai-backup
    volumes:
      - brain-data:/data/brain:ro
      - backup-data:/backups
    networks: [daveai-net]
    restart: unless-stopped

  # ── 9. PIXELPAW BUILDER ───────────────────────────────
  pixelpaw-builder:
    build: ./containers/pixelpaw-builder
    container_name: daveai-pixelpaw-builder
    networks: [daveai-net]
    volumes:
      # Mount PixelPaw source from G:\github\PixelPaw
      - ../../PixelPaw:/source:ro
      # Persistent builds
      - pixelpaw-builds:/app/public
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s  # Build takes time
