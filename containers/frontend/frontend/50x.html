<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Unavailable — DaveAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020810;color:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 40% at 30% 20%,rgba(234,88,51,.08) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 70% 80%,rgba(37,99,235,.06) 0%,transparent 60%);pointer-events:none}
.container{text-align:center;position:relative;z-index:1;padding:2rem}
.code{font-size:clamp(5rem,12vw,10rem);font-weight:900;letter-spacing:.1em;background:linear-gradient(135deg,#f97316,#ef4444);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;color:transparent;line-height:1;margin-bottom:.5rem}
.title{font-size:clamp(1.2rem,3vw,1.8rem);color:#94a3b8;margin-bottom:.75rem;font-weight:400}
.sub{font-size:.95rem;color:#64748b;margin-bottom:2rem;max-width:400px;margin-left:auto;margin-right:auto}
.back{display:inline-block;padding:12px 32px;background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;text-decoration:none;border-radius:8px;font-size:1rem;font-weight:600;transition:all .3s;border:none;cursor:pointer}
.back:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(249,115,22,.3)}
.grid{position:fixed;inset:0;background-image:radial-gradient(#172040 1px,transparent 0);background-size:26px 26px;opacity:.5;pointer-events:none}
</style>
<meta http-equiv="refresh" content="15">
</head>
<body>
<div class="grid"></div>
<div class="container">
  <div class="code">503</div>
  <div class="title">DaveAI is restarting</div>
  <div class="sub">The service is temporarily unavailable. This page will auto-refresh in 15 seconds.</div>
  <a href="/" class="back">Try Again</a>
</div>
</body>
</html>
