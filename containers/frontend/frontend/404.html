<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — DaveAI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #020810;
      color: #f1f5f9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 50% 40% at 30% 20%, rgba(147, 51, 234, .08) 0%, transparent 60%), radial-gradient(ellipse 40% 40% at 70% 80%, rgba(37, 99, 235, .06) 0%, transparent 60%);
      pointer-events: none
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 2rem
    }

    .code {
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 900;
      letter-spacing: .1em;
      background: linear-gradient(135deg, #9333EA, #2563EB);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      line-height: 1;
      margin-bottom: .5rem
    }

    .title {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      color: #94a3b8;
      margin-bottom: 2rem;
      font-weight: 400
    }

    .back {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #9333EA, #2563EB);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      transition: all .3s;
      border: none;
      cursor: pointer
    }

    .back:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(147, 51, 234, .3)
    }

    .links {
      margin-top: 2rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap
    }

    .links a {
      color: #8b5cf6;
      text-decoration: none;
      font-size: .9rem;
      transition: color .2s
    }

    .links a:hover {
      color: #a78bfa
    }

    .grid {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(#172040 1px, transparent 0);
      background-size: 26px 26px;
      opacity: .5;
      pointer-events: none
    }
  </style>
</head>

<body>
  <div class="grid"></div>
  <div class="container">
    <div class="code">404</div>
    <div class="title">This page doesn't exist yet — but DaveAI could build it.</div>
    <a href="/" class="back">← Back to DaveAI</a>
    <div class="links">
      <a href="/arcade/">Arcade</a>
      <a href="/games/daves-siege-td/">Dave's Siege TD</a>
      <a href="/api/health">API Health</a>
    </div>
  </div>
</body>

</html>
