# ═══════════════════════════════════════════════════════════
#  DaveAI.tech Nginx Configuration
#  Reverse proxy for modular Docker ecosystem
# ═══════════════════════════════════════════════════════════

upstream frontend {
    server frontend:8080;
}

upstream agent-brain {
    server agent-brain:8888;
}

upstream edge-tts {
    server edge-tts:5050;
}

upstream serve-api {
    server serve-api:8090;
}

upstream agentic-ui {
    server agentic-ui:3001;
}

upstream pixelpaw-builder {
    server pixelpaw-builder:8085;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=tts:10m rate=50r/m;

server {
    listen 80;
    server_name daveai.tech www.daveai.tech;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS for API endpoints (VS Code webview support)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Handle preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Client max body size (for image uploads)
    client_max_body_size 50M;

    # ── API Routes → Agent Brain ──────────────────────────
    location /api {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://agent-brain;
        proxy_http_version 1.1;
        
        # WebSocket support for SSE
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE settings
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── TTS Routes → Edge TTS ─────────────────────────────
    location ~ ^/api/(tts|edge-tts|voices) {
        limit_req zone=tts burst=10 nodelay;
        
        proxy_pass http://edge-tts;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Increase timeout for TTS generation
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Games API → Serve API ─────────────────────────────
    location /api/games {
        proxy_pass http://serve-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Agentic UI (alternate interface) ──────────────────
    location /ui {
        proxy_pass http://agentic-ui;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── PixelPaw Downloads ────────────────────────────────
    location /downloads {
        proxy_pass http://pixelpaw-builder;
        proxy_set_header Host $host;
        
        # Cache .vsix files
        proxy_cache_valid 200 1h;
    }

    location /pixelpaw/docs {
        proxy_pass http://pixelpaw-builder/docs/;
        proxy_set_header Host $host;
    }

    # ── Frontend (static site) ────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Cache static assets
        proxy_cache_valid 200 10m;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

